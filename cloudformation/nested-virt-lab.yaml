AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Nested virt lab — drop-in template. Upload this file only; no repo clone, no S3 prep,
  no publish step. Creates bootstrap bucket, seeds runtime scripts, launches both metal sites,
  and runs the full pipeline on-instance (bootstrap → Windows L1 → Hyper-V L2 → ALL GREEN SSM).

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName

  VpcId:
    Type: AWS::EC2::VPC::Id

  VpcCidr:
    Type: String
    Default: 172.31.0.0/16

  AdminCidr:
    Type: String
    Default: 172.31.0.0/16

  InstanceType:
    Type: String
    Default: c7i.metal-48xl

  Site0SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Metal host subnet AZ-a (site 0).

  Site1SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Metal host subnet AZ-b (site 1).

  Site0TransportSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Transport /28 AZ-a.

  Site1TransportSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Transport /28 AZ-b.

  RootNotifyEmail:
    Type: String
    Default: ''
    Description: >-
      Optional email for SNS notification when the lab pipeline reaches ALL GREEN
      (CloudWatch alarm on NestedVirt/LabVerification LabStatus). Confirm the SNS subscription.

  AssociatePublicIp:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  WindowsIsoDownloadUrl:
    Type: String
    Default: https://software-static.download.prss.microsoft.com/sg/download/888969d5-f34g-4e03-ac9d-1f9786c66749/SERVER_EVAL_x64FRE_en-us.iso
    Description: >-
      Public HTTPS URL for Windows Server 2022 ISO (~5 GB). Downloaded by metal
      hosts at bootstrap — default Microsoft evaluation CDN URL.
      Override only if you mirror the ISO yourself.

Mappings:
  Release:
    Bundle:
      Data: ''

Conditions:
  HasNotifyEmail: !Not [!Equals [!Ref RootNotifyEmail, '']]

Resources:
  LabKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub '${AWS::StackName} nested-virt lab encryption (S3, SNS, SQS)'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: lab-kms
        Statement:
          - Sid: EnableIamUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: AllowS3Use
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
          - Sid: AllowSQS
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  LabBootstrapBucket:
    Type: AWS::S3::Bucket
    DependsOn: LabKmsKey
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LabBootstrapBucket
        LogFilePrefix: access-logs/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt LabKmsKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LabBootstrapBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LabBootstrapBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationNestedStackTemplates
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${LabBootstrapBucket.Arn}/nested-virt/cloudformation/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: S3ServerAccessLogs
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${LabBootstrapBucket.Arn}/access-logs/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !GetAtt LabBootstrapBucket.Arn

  SeedLambdaDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt LabKmsKey.Arn

  SeedLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: seed-bucket
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt LabBootstrapBucket.Arn
                  - !Sub '${LabBootstrapBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Resource: !GetAtt LabKmsKey.Arn
        - PolicyName: seed-dlq
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt SeedLambdaDeadLetterQueue.Arn

  SeedLambda:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: One-shot script seed custom resource; S3-only, no VPC required
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SeedLambdaRole.Arn
      Timeout: 300
      ReservedConcurrentExecutions: 1
      TracingConfig:
        Mode: Active
      DeadLetterConfig:
        TargetArn: !GetAtt SeedLambdaDeadLetterQueue.Arn
      Code:
        ZipFile: |
          """Custom resource: extract embedded script bundle zip into the lab S3 bucket."""
          import base64
          import io
          import zipfile
          
          import boto3
          
          # Minimal cfnresponse (no external deps).
          import json
          import urllib.request
          
          
          def send(event, context, status, data, reason=None):
              body = json.dumps(
                  {
                      "Status": status,
                      "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                      "PhysicalResourceId": event.get("PhysicalResourceId")
                      or event["ResourceProperties"].get("Bucket")
                      or context.log_stream_name,
                      "StackId": event["StackId"],
                      "RequestId": event["RequestId"],
                      "LogicalResourceId": event["LogicalResourceId"],
                      "Data": data or {},
                  }
              ).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  headers={"Content-Type": ""},
                  method="PUT",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  resp.read()
          
          
          def handler(event, context):
              bucket = event["ResourceProperties"]["Bucket"]
              if event["RequestType"] == "Delete":
                  send(event, context, "SUCCESS", {"Bucket": bucket})
                  return
          
              bundle_b64 = event["ResourceProperties"]["Bundle"]
              raw = base64.b64decode(bundle_b64)
              s3 = boto3.client("s3")
              with zipfile.ZipFile(io.BytesIO(raw)) as zf:
                  for name in zf.namelist():
                      if name.endswith("/"):
                          continue
                      s3.put_object(Bucket=bucket, Key=name, Body=zf.read(name))
          
              send(event, context, "SUCCESS", {"Bucket": bucket, "Seeded": "true"})

  ScriptSeed:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: LabBootstrapBucket
    Properties:
      ServiceToken: !GetAtt SeedLambda.Arn
      Bucket: !Ref LabBootstrapBucket
      Bundle: !FindInMap [Release, Bundle, Data]

  Site0Stack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ScriptSeed
    Properties:
      TemplateURL: !Sub 'https://${LabBootstrapBucket}.s3.${AWS::Region}.amazonaws.com/nested-virt/cloudformation/site.yaml'
      Parameters:
        LaunchInstance: 'true'
        KeyName: !Ref KeyName
        VpcId: !Ref VpcId
        SubnetId: !Ref Site0SubnetId
        ExtraHostNicSubnetId: !Ref Site0TransportSubnetId
        VpcCidr: !Ref VpcCidr
        AdminCidr: !Ref AdminCidr
        InstanceName: nested-virt-s0-01
        InstanceType: !Ref InstanceType
        SiteId: '0'
        PeerTransportEniIp: ''
        PeerLabSupernet: ''
        RootNotifyEmail: !Ref RootNotifyEmail
        AssociatePublicIp: !Ref AssociatePublicIp
        BootstrapBucket: !Ref LabBootstrapBucket
        WindowsIsoDownloadUrl: !Ref WindowsIsoDownloadUrl

  Site1Stack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ScriptSeed
    Properties:
      TemplateURL: !Sub 'https://${LabBootstrapBucket}.s3.${AWS::Region}.amazonaws.com/nested-virt/cloudformation/site.yaml'
      Parameters:
        LaunchInstance: 'true'
        KeyName: !Ref KeyName
        VpcId: !Ref VpcId
        SubnetId: !Ref Site1SubnetId
        ExtraHostNicSubnetId: !Ref Site1TransportSubnetId
        VpcCidr: !Ref VpcCidr
        AdminCidr: !Ref AdminCidr
        InstanceName: nested-virt-s1-01
        InstanceType: !Ref InstanceType
        SiteId: '1'
        PeerTransportEniIp: ''
        PeerLabSupernet: ''
        RootNotifyEmail: !Ref RootNotifyEmail
        AssociatePublicIp: !Ref AssociatePublicIp
        BootstrapBucket: !Ref LabBootstrapBucket
        WindowsIsoDownloadUrl: !Ref WindowsIsoDownloadUrl

  LabStatusTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotifyEmail
    Properties:
      KmsMasterKeyId: !GetAtt LabKmsKey.Arn
      Subscription:
        - Endpoint: !Ref RootNotifyEmail
          Protocol: email

  LabGreenAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotifyEmail
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lab-green'
      AlarmDescription: Nested virt lab pipeline reached ALL GREEN
      Namespace: NestedVirt/LabVerification
      MetricName: LabStatus
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LabStatusTopic

Outputs:
  BootstrapBucket:
    Value: !Ref LabBootstrapBucket
  Site0InstanceId:
    Value: !GetAtt Site0Stack.Outputs.InstanceId
  Site1InstanceId:
    Value: !GetAtt Site1Stack.Outputs.InstanceId
  Site0PublicIp:
    Value: !GetAtt Site0Stack.Outputs.PublicIp
  Site1PublicIp:
    Value: !GetAtt Site1Stack.Outputs.PublicIp
  Site0TransportIp:
    Value: !GetAtt Site0Stack.Outputs.TransportNic1PrivateIp
  Site1TransportIp:
    Value: !GetAtt Site1Stack.Outputs.TransportNic1PrivateIp
  LabVerificationParameter:
    Description: SSM parameter written when lab pipeline is definitively GREEN (both sites)
    Value: /nested-virt/lab/verification
  LabVerificationCheck:
    Description: 'Poll after CREATE_COMPLETE (~40-90 min). status GREEN = ALL GREEN'
    Value: !Sub 'aws ssm get-parameter --name /nested-virt/lab/verification --region ${AWS::Region} --query Parameter.Value --output text | python3 -m json.tool'
  PipelineNote:
    Description: No repo clone required — pipeline runs on metal after CREATE_COMPLETE
    Value: >-
      CREATE_COMPLETE launches metal only. Bootstrap, guests, L2, and verification run
      automatically via systemd. Confirm instance_ids in SSM JSON match Site0InstanceId
      and Site1InstanceId outputs.
