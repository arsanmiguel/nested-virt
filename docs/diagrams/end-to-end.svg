    <text x="310" y="354" text-anchor="middle" font-size="16" fill="#64748b">10.0.1.10 | MAC 52:54:00:10:00:10</text>
    <text x="310" y="372" text-anchor="middle" font-size="14" fill="#94a3b8">libvirt domain win-hv-nested (site 0 only)</text>

    <rect x="140" y="396" width="340" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
