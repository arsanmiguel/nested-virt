  <text x="800" y="966" text-anchor="middle" font-size="15" font-weight="600" fill="#4338ca">172.31.48.10 &lt;-&gt; 172.31.48.26</text>

  <text x="800" y="988" text-anchor="middle" font-size="16" fill="#64748b">Each column is one metal host. Same libvirt/Hyper-V names are per-host, not shared.</text>
