    <text x="310" y="592" text-anchor="middle" font-size="19" font-weight="600">nic1 (transport ENI /28)</text>
    <text x="310" y="616" text-anchor="middle" font-size="16" fill="#64748b">172.31.48.10 | GRE outer header src</text>

    <line x1="310" y1="290" x2="310" y2="298" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
    <line x1="310" y1="386" x2="310" y2="394" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
    <line x1="310" y1="462" x2="310" y2="470" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
  </g>

