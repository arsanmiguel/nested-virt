    <rect x="60" y="562" width="500" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="310" y="592" text-anchor="middle" font-size="19" font-weight="600">nic1 (transport ENI /28)</text>
    <text x="310" y="616" text-anchor="middle" font-size="16" fill="#64748b">172.31.48.26 | GRE outer header src</text>

    <line x1="310" y1="290" x2="310" y2="298" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
    <line x1="310" y1="386" x2="310" y2="394" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
    <line x1="310" y1="462" x2="310" y2="470" stroke="#475569" stroke-width="2" marker-start="url(#arrow-gray-border-up)" marker-end="url(#arrow-gray-border-down)"/>
  </g>

  <!-- VPC mgmt plane: nic0 across both sites -->
  <line x1="658" y1="369" x2="672" y2="369" stroke="#2563eb" stroke-width="2" marker-start="url(#arrow-blue-border-left)" marker-end="url(#arrow-blue-border-right)"/>
  <line x1="688" y1="369" x2="912" y2="369" stroke="#2563eb" stroke-width="2" marker-start="url(#arrow-blue-border-left)" marker-end="url(#arrow-blue-border-right)"/>
  <line x1="928" y1="369" x2="942" y2="369" stroke="#2563eb" stroke-width="2" marker-start="url(#arrow-blue-border-left)" marker-end="url(#arrow-blue-border-right)"/>
  <rect x="682" y="352" width="236" height="22" rx="4" fill="#fafafa"/>
  <text x="800" y="367" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">VPC | SSM / SSH / NAT (nic0)</text>

  <!-- L1: br-default to GRE -->
  <line x1="658" y1="503" x2="682" y2="503" stroke="#dc2626" stroke-width="2" marker-start="url(#arrow-red-border-left)" marker-end="url(#arrow-red-border-right)"/>
  <line x1="918" y1="503" x2="1002" y2="503" stroke="#dc2626" stroke-width="2" marker-start="url(#arrow-red-border-left)" marker-end="url(#arrow-red-border-right)"/>

