<?xml version="1.0" encoding="UTF-8"?>
<!-- BASELINE: locked hero topology - run ./docs/diagrams/render-end-to-end.sh after edits -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-gray-border-up" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,8 L4,0 L8,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-gray-border-down" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L4,8 L8,0 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-red-border-left" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M8,0 L0,4 L8,8 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-red-border-right" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue-border-left" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M8,0 L0,4 L8,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-blue-border-right" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple-border-left" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M8,0 L0,4 L8,8 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-purple-border-right" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#fafafa"/>
  <text x="800" y="42" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">End-to-end topology - two AZs, three proof layers</text>
  <text x="800" y="72" text-anchor="middle" font-size="18" fill="#64748b">Site 0 (10.0.0.0/16) and Site 1 (10.1.0.0/16) | detail in docs/network-diagram.md</text>

  <g transform="translate(80,170)">
    <rect x="0" y="0" width="1440" height="56" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <g font-size="16" font-weight="600">
      <rect x="24" y="16" width="18" height="18" fill="#dbeafe" stroke="#2563eb"/><text x="50" y="30" fill="#1e293b">VPC</text>
      <rect x="120" y="16" width="18" height="18" fill="#ede9fe" stroke="#7c3aed"/><text x="146" y="30" fill="#1e293b">Transport /28</text>
      <rect x="300" y="16" width="18" height="18" fill="#dcfce7" stroke="#16a34a"/><text x="326" y="30" fill="#1e293b">Site 0 lab</text>
      <rect x="460" y="16" width="18" height="18" fill="#ffedd5" stroke="#ea580c"/><text x="486" y="30" fill="#1e293b">Site 1 lab</text>
      <rect x="620" y="16" width="18" height="18" fill="#fee2e2" stroke="#dc2626"/><text x="646" y="30" fill="#1e293b">GRE gre-peer</text>
      <rect x="790" y="16" width="18" height="18" fill="#ccfbf1" stroke="#0d9488"/><text x="816" y="30" fill="#1e293b">Hyper-V vSwitch</text>
      <rect x="980" y="16" width="18" height="18" fill="#f3f4f6" stroke="#6b7280"/><text x="1006" y="30" fill="#1e293b">Mgmt / NAT nic0</text>
    </g>
  </g>

  <!-- VPC fabric underlay (172.31.0.0/16) - ENI layers only, not nested lab stack -->
  <rect x="45" y="318" width="1510" height="98" rx="12" fill="#dbeafe" fill-opacity="0.35" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 6"/>
  <rect x="45" y="802" width="1510" height="118" rx="12" fill="#dbeafe" fill-opacity="0.35" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 6"/>
  <line x1="45" y1="416" x2="45" y2="802" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 6"/>
  <line x1="1555" y1="416" x2="1555" y2="802" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 6"/>
  <rect x="682" y="324" width="236" height="54" rx="4" fill="#fafafa" fill-opacity="0.95"/>
  <text x="800" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">VPC fabric</text>
  <text x="800" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">172.31.0.0/16</text>
  <text x="800" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">primary ENIs</text>
  <text x="800" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">transport ENIs</text>

  <!-- L1 label + GRE box centered in column gap (680-920) -->
  <rect x="682" y="378" width="236" height="30" rx="4" fill="#fafafa"/>
  <text x="800" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">L1 - lab supernets</text>
  <text x="800" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">linked via GRE</text>

  <g transform="translate(690, 412)">
    <rect x="0" y="0" width="220" height="78" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 6"/>
    <text x="110" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#991b1b">gre-peer (L1)</text>
    <text x="110" y="54" text-anchor="middle" font-size="14" fill="#7f1d1d">10.0.0.0/16 &lt;-&gt; 10.1.0.0/16</text>
    <text x="110" y="72" text-anchor="middle" font-size="13" fill="#991b1b">outer: transport IPs</text>
  </g>

