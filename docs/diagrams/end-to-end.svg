<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="#fafafa"/>
  <text x="800" y="42" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">End-to-end topology - two AZs, three proof layers</text>
  <text x="800" y="72" text-anchor="middle" font-size="18" fill="#64748b">KVM -&gt; Hyper-V -&gt; Ubuntu | GRE-linked lab supernets | docs/network-diagram.md</text>

  <g transform="translate(80,95)">
    <rect x="0" y="0" width="1440" height="56" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <g font-size="16" font-weight="600">
      <rect x="24" y="16" width="18" height="18" fill="#dbeafe" stroke="#2563eb"/><text x="50" y="30" fill="#1e293b">VPC</text>
      <rect x="120" y="16" width="18" height="18" fill="#ede9fe" stroke="#7c3aed"/><text x="146" y="30" fill="#1e293b">Transport /28</text>
      <rect x="300" y="16" width="18" height="18" fill="#dcfce7" stroke="#16a34a"/><text x="326" y="30" fill="#1e293b">Site 0 lab</text>
      <rect x="460" y="16" width="18" height="18" fill="#ffedd5" stroke="#ea580c"/><text x="486" y="30" fill="#1e293b">Site 1 lab</text>
      <rect x="620" y="16" width="18" height="18" fill="#fee2e2" stroke="#dc2626"/><text x="646" y="30" fill="#1e293b">GRE gre-peer</text>
      <rect x="790" y="16" width="18" height="18" fill="#ccfbf1" stroke="#0d9488"/><text x="816" y="30" fill="#1e293b">Hyper-V vSwitch</text>
      <rect x="980" y="16" width="18" height="18" fill="#f3f4f6" stroke="#6b7280"/><text x="1006" y="30" fill="#1e293b">Mgmt / NAT nic0</text>
    </g>
  </g>

  <g transform="translate(60,190)" filter="url(#shadow)">
    <rect x="0" y="0" width="620" height="660" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <text x="310" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#166534">Availability Zone A - Site 0</text>
    <text x="310" y="64" text-anchor="middle" font-size="18" fill="#64748b">Lab supernet 10.0.0.0/16 | gateway 10.0.1.1</text>

    <rect x="30" y="90" width="560" height="70" rx="10" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="310" y="120" text-anchor="middle" font-size="20" font-weight="600">nic0 - kvm-host-nic0 | SSH / SSM / NAT</text>
    <text x="310" y="146" text-anchor="middle" font-size="16" fill="#64748b">172.31.x.x (VPC primary ENI)</text>

    <rect x="30" y="180" width="560" height="450" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="310" y="215" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">c7i.metal-48xl | Amazon Linux 2023</text>

    <rect x="60" y="240" width="500" height="58" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="310" y="275" text-anchor="middle" font-size="20" font-weight="600">br-default | 10.0.1.1/24 | dnsmasq | GRE endpoint</text>

    <rect x="100" y="320" width="420" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="310" y="355" text-anchor="middle" font-size="20" font-weight="600">KVM / libvirt | win-hv-nested</text>
    <text x="310" y="378" text-anchor="middle" font-size="16" fill="#64748b">Windows Server 2022 | 10.0.1.10</text>

    <rect x="140" y="400" width="340" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="310" y="435" text-anchor="middle" font-size="20" font-weight="600">Hyper-V | NestedVirt-Lab vSwitch</text>

    <rect x="180" y="480" width="260" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="310" y="515" text-anchor="middle" font-size="20" font-weight="700">Ubuntu inner | 10.0.1.20</text>

    <rect x="60" y="560" width="500" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="310" y="592" text-anchor="middle" font-size="18" font-weight="600">nic1 - kvm-host-nic1 | transport ENI /28</text>

    <line x1="310" y1="298" x2="310" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="310" y1="378" x2="310" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="310" y1="458" x2="310" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(720,340)">
    <rect x="0" y="0" width="160" height="280" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 6"/>
    <text x="80" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#991b1b">GRE</text>
    <text x="80" y="80" text-anchor="middle" font-size="18" font-weight="600" fill="#b91c1c">gre-peer</text>
    <text x="80" y="130" text-anchor="middle" font-size="15" fill="#7f1d1d">L1 encap</text>
    <text x="80" y="155" text-anchor="middle" font-size="15" fill="#7f1d1d">10.1.0.0/16 &lt;-&gt;</text>
    <text x="80" y="180" text-anchor="middle" font-size="15" fill="#7f1d1d">10.0.0.0/16</text>
    <text x="80" y="230" text-anchor="middle" font-size="14" fill="#991b1b">outer: transport</text>
    <text x="80" y="252" text-anchor="middle" font-size="14" fill="#991b1b">172.31.x.x</text>
  </g>

  <g transform="translate(920,190)" filter="url(#shadow)">
    <rect x="0" y="0" width="620" height="660" rx="16" fill="#ffffff" stroke="#ea580c" stroke-width="3"/>
    <text x="310" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#9a3412">Availability Zone B - Site 1</text>
    <text x="310" y="64" text-anchor="middle" font-size="18" fill="#64748b">Lab supernet 10.1.0.0/16 | gateway 10.1.1.1</text>

    <rect x="30" y="90" width="560" height="70" rx="10" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="310" y="120" text-anchor="middle" font-size="20" font-weight="600">nic0 - kvm-host-nic0 | SSH / SSM / NAT</text>
    <text x="310" y="146" text-anchor="middle" font-size="16" fill="#64748b">172.31.x.x (VPC primary ENI)</text>

    <rect x="30" y="180" width="560" height="450" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="310" y="215" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">c7i.metal-48xl | Amazon Linux 2023</text>

    <rect x="60" y="240" width="500" height="58" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="310" y="275" text-anchor="middle" font-size="20" font-weight="600">br-default | 10.1.1.1/24 | dnsmasq | GRE endpoint</text>

    <rect x="100" y="320" width="420" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="310" y="355" text-anchor="middle" font-size="20" font-weight="600">KVM / libvirt | win-hv-nested</text>
    <text x="310" y="378" text-anchor="middle" font-size="16" fill="#64748b">Windows Server 2022 | 10.1.1.10</text>

    <rect x="140" y="400" width="340" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="310" y="435" text-anchor="middle" font-size="20" font-weight="600">Hyper-V | NestedVirt-Lab vSwitch</text>

    <rect x="180" y="480" width="260" height="58" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="310" y="515" text-anchor="middle" font-size="20" font-weight="700">Ubuntu inner | 10.1.1.20</text>

    <rect x="60" y="560" width="500" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="310" y="592" text-anchor="middle" font-size="18" font-weight="600">nic1 - kvm-host-nic1 | transport ENI /28</text>

    <line x1="310" y1="298" x2="310" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="310" y1="378" x2="310" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="310" y1="458" x2="310" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <line x1="590" y1="780" x2="720" y2="480" stroke="#7c3aed" stroke-width="3"/>
  <line x1="880" y1="480" x2="680" y2="780" stroke="#7c3aed" stroke-width="3"/>
  <text x="800" y="820" text-anchor="middle" font-size="20" font-weight="700" fill="#4338ca">L0 - transport ENIs reachable across VPC</text>

  <path d="M 680 520 Q 800 500 880 520" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 880 440 Q 800 420 680 440" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="800" y="870" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">L2 - inner .20 ping cross-AZ (./invoke-routing-proof.sh --layer l2)</text>

  <text x="800" y="905" text-anchor="middle" font-size="16" fill="#64748b">Click image to open full-size vector SVG</text>
</svg>
