    <rect x="180" y="472" width="260" height="74" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="310" y="502" text-anchor="middle" font-size="19" font-weight="700">Hyper-V guest: Ubuntu 24.04</text>
