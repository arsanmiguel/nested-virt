    <rect x="0" y="0" width="620" height="620" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <text x="310" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#166534">AZ A - Site 0</text>
    <text x="310" y="64" text-anchor="middle" font-size="18" fill="#64748b">nested-virt-s0-01 | lab 10.0.0.0/16</text>

