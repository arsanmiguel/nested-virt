  <text x="800" y="860" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">VPC routes transport /32</text>

  <line x1="688" y1="900" x2="912" y2="900" stroke="#7c3aed" stroke-width="2" marker-start="url(#arrow-purple-border-left)" marker-end="url(#arrow-purple-border-right)"/>
